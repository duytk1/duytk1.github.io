# Deploys the Vite production build (dist/), NOT the repo root.
#
# REQUIRED — GitHub repo: Settings → Pages → Build and deployment:
#   Source: GitHub Actions  (NOT "Deploy from a branch")
# If Source is a branch, GitHub serves this repo's index.html unchanged, so the browser
# requests /src/main.jsx from the domain root → 404. Only the built dist/ has bundled JS.
#
# After the first push with this workflow, pick this workflow under Pages if prompted.

name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Verify Vite replaced the dev entry in index.html
        run: |
          if grep -q 'src/main.jsx' dist/index.html; then
            echo "::error::dist/index.html still references /src/main.jsx — build output is wrong."
            cat dist/index.html
            exit 1
          fi
          echo "OK: dist/index.html uses production bundles."
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
