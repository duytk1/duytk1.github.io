name: Deploy to GitHub Pages

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Verify Vite replaced the dev entry in index.html
        run: |
          if grep -q 'src/main.jsx' dist/index.html; then
            echo "::error::dist/index.html still references /src/main.jsx — build output is wrong."
            cat dist/index.html
            exit 1
          fi
          echo "OK: dist/index.html uses production bundles."
      # Required before upload-pages-artifact; without it Pages deploy can fail or serve incorrectly.
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
