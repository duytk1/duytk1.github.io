# Static site: no npm/Vite. Copies HTML/CSS/JS and assets into _site/ and deploys to GitHub Pages.
# Settings → Pages → Source: GitHub Actions

name: Deploy to GitHub Pages

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Assemble site
        run: |
          mkdir -p _site/images _site/videos
          cp index.html styles.css portfolio.js _site/
          cp .nojekyll _site/
          if [ -d images ]; then cp -r images/. _site/images/; fi
          if [ -d public/images ]; then cp -r public/images/. _site/images/; fi
          if [ -d videos ]; then cp -r videos/. _site/videos/; fi
          if [ -d public/videos ]; then cp -r public/videos/. _site/videos/; fi
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - uses: actions/deploy-pages@v4
        id: deployment
